<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SecureCookieGuard</title>
  <link rel="stylesheet" href="popup.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- 🔥 LANDING SCREEN -->
   <div id="landing">

  <!-- spacer pushes button down -->
  <div class="landing-top"></div>

  <button id="startBtn">Scan Storage</button>

</div>

    <!-- 🔍 MAIN APP (hidden initially) -->
    <div id="app" style="display:none;">

      <div class="header">
        <img src="icons/logo.png" class="header-logo" />
        <span class="header-title">SecureCookieGuard</span>
      </div>

      <button id="dashboardBtn" style="margin-top:10px; display:none;">
        View Dashboard
      </button>

      <button id="backBtn" style="margin-top:10px; display:none;">
        Back
      </button>

      <div id="results" class="results"></div>

    </div>

  </div>

  <script src="popup.js"></script>

</html>
